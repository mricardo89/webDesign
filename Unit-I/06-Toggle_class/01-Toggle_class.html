<!DOCTYPE html>

<body>

    <h1 id="saludo">Mi Portafolio Creativo</h1>
    <button onclick="cambiarTema()">🌙 Cambiar Tema</button>

    <script>
        function cambiarTema() {

            cuerpo.classList.toggle("modo-oscuro");
        }
    </script>
