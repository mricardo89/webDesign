<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Light switch</title>
    </head>

    <body>

        <h1 id="titulo-principal">Hola, soy estático</h1>
        <button onclick="modoNoche()">Dark mode</button>

    </body>

    <script>
        function modoNoche() {
            document.body.style.backgroundColor = "black";
            document.body.style.color = "white";
        }
    </script>
</html>
