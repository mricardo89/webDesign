<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Simple calculator</title>
    </head>

    <body>

        <div class="calculadora-card">
            <h2>Sumadora troll</h2>
            
            <input type="number" id="num1" placeholder="Primer número">
            <br>
            <input type="number" id="num2" placeholder="Segundo número">
            <br>
            
            <button onclick="calcularTroll()">Calcular Suma</button>
            
            <p id="resultado">Esperando números...</p>
        </div>

    </body>

    <script>
        function calcularTroll() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            
            let sumaReal = n1 + n2;
            let mensaje = document.getElementById("resultado");

            // Lógica Troll
            if (n1 === 2 && n2 === 2) {
                mensaje.innerHTML = "Resultado: Pez 🐟";
            } else if (sumaReal > 100) {
                mensaje.innerHTML = "Resultado: " + sumaReal + ". ¡Uf, número muy grande, me cansé!";
                document.body.style.backgroundColor = "red"; // Cambia el fondo por dramatismo
            } else {
                // Falla a propósito sumándole 1 al resultado real
                mensaje.innerHTML = "Resultado: " + (sumaReal + 1) + " (Aprox)"; 
                document.body.style.backgroundColor= "#4CAF50";
            }
        }
        </script>
</html>
