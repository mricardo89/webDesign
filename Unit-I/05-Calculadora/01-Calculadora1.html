<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Simple calculator</title>
    </head>

    <body>

        <div class="calculadora-card">
            <h2>Sumadora Inteligente</h2>
            
            <input type="number" id="num1" placeholder="Primer número">
            <br>
            <input type="number" id="num2" placeholder="Segundo número">
            <br>
            
            <button onclick="sumar()">Calcular Suma</button>
            
            <p id="resultado">Esperando números...</p>
        </div>

    </body>

    <script>
        function sumar() {
            // 1. Atrapamos los valores tal como el usuario los escribió (texto)
            let input1 = document.getElementById("num1").value;
            let input2 = document.getElementById("num2").value;
            let cajaResultado = document.getElementById("resultado");

            // CONDICIONAL 1: Validación (¿Están vacíos?)
            // El símbolo === significa "es exactamente igual a"
            // El símbolo || significa "O" (Or)
            if (input1 === "" || input2 === "") {
                cajaResultado.innerHTML = "⚠️ Hey, te faltan números.";
                cajaResultado.style.color = "orange";
            } 
            else {
                // Si llegamos al 'else', significa que sí hay datos. 
                // Ahora sí, convertimos a Número y sumamos.
                let sumaTotal = Number(input1) + Number(input2);

                // CONDICIONAL 2: Evaluamos el resultado final
                if (sumaTotal > 100) {
                    cajaResultado.innerHTML = "Resultado: " + sumaTotal + " 🔥 (¡Muy alto!)";
                    cajaResultado.style.color = "red";
                } 
                else if (sumaTotal < 0) {
                    cajaResultado.innerHTML = "Resultado: " + sumaTotal + " ❄️ (Bajo cero)";
                    cajaResultado.style.color = "blue";
                } 
                else {
                    cajaResultado.innerHTML = "Resultado: " + sumaTotal;
                    cajaResultado.style.color = "green";
                }
            }
        }
    </script>
</html>
