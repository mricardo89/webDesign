<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Opción 2: Tensión Diagonal</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            font-family: Arial, sans-serif;
        }

        .poster {
            width: 400px;
            height: 600px;
            background-color: #2E2E2E; /* Gris Oscuro */
            position: relative;
            overflow: hidden; /* VITAL: Corta las líneas que se salen */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* El Cuadrado Naranja Rotado */
        .rombo {
            width: 200px;
            height: 200px;
            background-color: #E07A5F;
            
            position: absolute;
            top: 50%;
            left: 50%;
            /* Rotamos 45 grados y ajustamos el centro */
            transform: translate(-50%, -50%) rotate(45deg); 
            z-index: 2; /* Para que quede encima de las líneas */
        }

        /* Estilo compartido para las líneas */
        .linea {
            height: 4px; /* Grosor de la línea */
            width: 800px; /* Muy larga para asegurar que cruce todo */
            background-color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 1;
        }

        /* Línea 1: Sigue la diagonal principal */
        .linea-1 {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* Línea 2: La diagonal opuesta (perpendicular) */
        .linea-2 {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .texto {
            font-size: 8rem;
            color: rgba(255, 255, 255, 0.1); /* Texto sutil de fondo */
            font-weight: 900;
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
        }
        
        .anio {
            color: #FFF;
            font-size: 2rem;
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="texto">ART</div>
        <div class="linea linea-1"></div>
        <div class="linea linea-2"></div>
        <div class="rombo"></div>
        <div class="anio">1923</div>
    </div>
</body>
</html>
